name: Poll releases
on:
  push:

  # Daily
  schedule:
    - cron:  '0 0 * * *'

  # Manually
  workflow_dispatch:

permissions:
  contents: write

jobs:
  define-matrix:
    runs-on: ubuntu-latest

    outputs:
      releases: ${{ steps.releases.outputs.matrix }}

    steps:
      - name: Define releases
        id: releases
        run: |
          echo 'matrix={"include":[{"prerelease":"false"},{"prerelease":"true"}]}' >> $GITHUB_OUTPUT


  check-upstream:
    needs: [define-matrix]
    name: Check upstream version
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix: ${{ fromJSON(needs.define-matrix.outputs.releases) }}

    outputs:
      release-version: ${{ steps.releases.outputs.release-version }}
      prerelease-version: ${{ steps.releases.outputs.prerelease-version }}

    steps:
      - name: Get upstream (pre)release
        id: upstream
        run: |
          TAG=$(curl -sL --request GET \
            --url "${{ github.api_url }}/repos/nextcloud/server/releases" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: token ${{ github.token }}" \
            | jq --argjson pr ${{ matrix.prerelease }} \
            -r 'map(select(.prerelease==$pr)) | first | .tag_name // ""')

          echo "version=${TAG//v}" >> $GITHUB_OUTPUT

      - name: Check if tag exists (local)
        uses: mukunku/tag-exists-action@v1.7.0
        id: check-tag
        with:
          tag: 'v${{ steps.upstream.outputs.version }}'

      - name: Check if image exists (remote)
        id: check-image
        run: |
          IMAGE=$(curl -sL --request GET \
            --url "https://hub.docker.com/v2/repositories/library/nextcloud/tags/?page_size=1000" \
            | jq -r '.results | .[] | select(.name | contains("${{ steps.upstream.outputs.version }}-fpm-alpine")) | .name')

          if [[ -n "$IMAGE" ]]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Store release
        id: releases
        if: ${{ !fromJSON(steps.check-tag.outputs.exists) && steps.check-image.outputs.exists }}
        run: |
            echo "${prerelease}-version=${{ steps.upstream.outputs.version }}" >> "$GITHUB_OUTPUT"
        env:
          prerelease: ${{ !fromJSON(matrix.prerelease) && 'release' || 'prerelease' }}

  commit-and-push:
    needs: [check-upstream]
    name: Push commits and release upstream version
    runs-on: ubuntu-latest

    outputs:
      matrix-include: ${{ steps.tag-matrix.outputs.matrix-include }}

    # Cannot use matrix in this instance
    env:
      release-version: ${{ needs.check-upstream.outputs.release-version }}
      prerelease-version: ${{ needs.check-upstream.outputs.prerelease-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Update Readme (release)
        if: env.release-version != ''
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: ${{ vars.RELEASE_VERSION }}
          replace: ${{ env.release-version }}
          include: 'README.md'
          regex: false

      - name: Commit changes (release)
        if: env.release-version != ''
        uses: EndBug/add-and-commit@v10
        with:
          committer_name: GitHub Actions
          committer_email: actions@github.com
          message: 'docs: Bump image version to ${{ env.release-version }}'
          push: false
          tag: 'v${{ env.release-version }}'

      - name: Update Readme (prerelease)
        if: env.prerelease-version != ''
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: ${{ vars.PRERELEASE_VERSION }}
          replace: ${{ env.prerelease-version }}
          include: 'README.md'
          regex: false

      - name: Commit changes (prerelease)
        if: env.prerelease-version != ''
        uses: EndBug/add-and-commit@v10
        with:
          committer_name: GitHub Actions
          committer_email: actions@github.com
          message: 'docs: Bump image version to ${{ env.prerelease-version }}'
          push: false
          tag: 'v${{ env.prerelease-version }}'

      - name: Define tags
        id: tag-matrix
        run: |
          if [[ -n "${{ env.release-version }}" ]] && [[ -n "${{ env.prerelease-version }}" ]]; then
            echo 'matrix-include=[{"tag":"v${{ env.release-version }}","version":"${{ env.release-version }}","prerelease":"false"},{"tag":"v${{ env.prerelease-version }}","version":"${{ env.prerelease-version }}","prerelease":"true"}]' >> $GITHUB_OUTPUT
          elif [[ -n "${{ env.release-version }}" ]]; then
            echo 'matrix-include=[{"tag":"v${{ env.release-version }}","version":"${{ env.release-version }}","prerelease":"false"}]' >> $GITHUB_OUTPUT
          elif [[ -n "${{ env.prerelease-version }}" ]]; then
            echo 'matrix-include=[{"tag":"v${{ env.prerelease-version }}","version":"${{ env.prerelease-version }}","prerelease":"true"}]' >> $GITHUB_OUTPUT
          else
            echo "There is no GitHub tag reference, skipping"
          fi

      - name: Push commits
        if: env.release-version != '' || env.prerelease-version != ''
        run: |
          git push --tags

  build:
    needs: [commit-and-push]
    name: Build images
    runs-on: ubuntu-latest
    if: needs.commit-and-push.outputs.matrix-include != ''

    permissions:
      packages: write

    strategy:
      max-parallel: 1
      fail-fast: true
      matrix:
        arch: ["amd64"]
        include: ${{ fromJSON(needs.commit-and-push.outputs.matrix-include) }}

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Sanitize repo slug
        uses: actions/github-script@v9
        id: repo-slug
        with:
          result-encoding: string
          script: return '${{ github.repository }}'.toLowerCase()

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ steps.repo-slug.outputs.result }}
          tags: |
            type=raw,priority=900,value=${{ matrix.version }},suffix=-fpm-alpine
            type=raw,priority=800,value=${{ matrix.version }}
          labels: |
            org.opencontainers.image.source="https://github.com/nextcloud/server"
            org.opencontainers.image.url="https://nextcloud.com/"

      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        continue-on-error: true
        id: buildx1
        with:
          build-args: |
            VERSION=${{ matrix.version }}
          context: .
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Temp workaround for failed builds
      - name: Wait to retry
        if: steps.buildx1.outcome != 'success'
        run: |
          sleep 60

      # Temp workaround for failed builds
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        if: steps.buildx1.outcome != 'success'
        with:
          build-args: |
            VERSION=${{ matrix.version }}
          context: .
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-release:
    needs: [build,commit-and-push]
    name: Publish releases
    runs-on: ubuntu-latest
    if: needs.commit-and-push.outputs.matrix-include != ''

    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJSON(needs.check-upstream.outputs.update-matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          prerelease: ${{ fromJSON(matrix.prerelease) }}
          tag: ${{ matrix.tag }}
          token: ${{ secrets.WF_PAT }}

      - name: Update repository variables
        run: |
          if [[ "${{ !fromJSON(matrix.prerelease) }}" == "true" ]]; then
            gh variable set RELEASE_VERSION --body "${{ matrix.version }}"
          else
            gh variable set PRERELEASE_VERSION --body "${{ matrix.version }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.VARS_PAT }}